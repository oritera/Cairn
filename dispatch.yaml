server: "http://cairn-server:8000"

common_env:
  TSEC_SERVER_HOST: "10.0.0.44:8000"
  TSEC_AGENT_TOKEN: "xxx"

runtime:
  interval: 3
  max_workers: 8
  max_running_projects: 3
  max_project_workers: 4
  healthcheck_timeout: 20
  prompt_group: "default"

tasks:
  bootstrap:
    timeout: 600
    conclude_timeout: 180
  reason:
    timeout: 300
    max_intents: 2
  explore:
    timeout: 600
    conclude_timeout: 180

container:
  image: "ghcr.io/oritera/cairn-worker-container:latest"
  network_mode: "host"
  completed_action: "stop"
  # cap_add:
  #   - "NET_RAW"
  #   - "NET_ADMIN"


workers:
  - name: "claudecode_deepseek-v4-flash"
    type: "claudecode"
    task_types: [bootstrap, reason, explore]
    max_running: 2
    priority: 0
    env:
      ANTHROPIC_MODEL: "deepseek-v4-flash"
      ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
      ANTHROPIC_AUTH_TOKEN: "sk-xxx"

  - name: "codex_qwen3.6-flash"
    type: "codex"
    task_types: [bootstrap,reason,explore]
    max_running: 2
    priority: 0
    env:
      CODEX_MODEL: "qwen3.6-flash"
      CODEX_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      OPENAI_API_KEY: "sk-xxx"


